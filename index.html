<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MMQR Transaction Monitoring</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#f5f7fa,#e4ecf7);
    padding: 30px;
}

h1 { text-align: center; }

#searchBox {
    display: block;
    margin: 20px auto;
    padding: 15px;
    width: 420px;
    border-radius: 20px;
    border: none;
}

#suggestionBox {
    width: 420px;
    margin: auto;
    background: white;
    border-radius: 10px;
    max-height: 200px;
    overflow-y: auto;
}

.suggestion { padding: 10px; cursor: pointer; }
.suggestion:hover { background: #eee; }

.card {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 20px;
    margin-top: 20px;
}

.kpi-container {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.kpi {
    flex: 1;
    text-align: center;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.5);
}

/* Badge */
.badge {
    padding: 5px 10px;
    border-radius: 10px;
    color: white;
    font-size: 12px;
}
.active { background: green; }
.inactive { background: red; }

/* Progress bar */
.progress {
    background: #eee;
    border-radius: 10px;
    height: 10px;
}
.progress-bar {
    height: 10px;
    border-radius: 10px;
    background: #4caf50;
}

table { width: 100%; margin-top:10px; }
td, th { padding: 8px; text-align:center; }
</style>
</head>

<body>

<h1>POS Transaction Monitoring</h1>

<input type="text" id="searchBox" placeholder="🔍 Search HQ ID / Store Name">
<div id="suggestionBox"></div>

<div id="result"></div>
<canvas id="chart" height="100"></canvas>

<script>
let sheetData = [];
let chart;

const API_URL = "https://script.google.com/macros/s/AKfycbzwtY0h5a0sGMXybaz4WlWPLOMhVSntMvLMwmZMIBkqwf6DtvRgcWEgKb9oAll-fxXQ/exec";

fetch(API_URL)
.then(res => res.json())
.then(data => sheetData = data);

// format
const formatNumber = n => Number(n||0).toLocaleString();

// dynamic month detect
function getMonths(item){
    return Object.keys(item)
        .filter(k => k.includes("Count"))
        .map(k => k.replace(" Count",""));
}

// search
const searchBox = document.getElementById("searchBox");
const suggestionBox = document.getElementById("suggestionBox");

searchBox.addEventListener("keyup", function(){

    let keyword = this.value.toLowerCase();
    suggestionBox.innerHTML = "";

    let filtered = sheetData.filter(item =>
        (item["HQ ID"]+"").toLowerCase().includes(keyword) ||
        (item["Store Name"]+"").toLowerCase().includes(keyword)
    );

    filtered.slice(0,10).forEach(item=>{
        let div = document.createElement("div");
        div.className = "suggestion";
        div.innerText = item["Store Name"];

        div.onclick = ()=>{
            showResult(item);
            suggestionBox.innerHTML="";
        };

        suggestionBox.appendChild(div);
    });
});

// show result
function showResult(item){

let months = getMonths(item);

let totalCount = 0;
let totalVol = 0;

let tableRows = "";
let volumes = [];

months.forEach(m=>{
    let c = Number(item[m+" Count"]||0);
    let v = Number(item[m+" Volume"]||0);

    totalCount += c;
    totalVol += v;
    volumes.push(v);

    tableRows += `
    <tr>
        <td>${m}</td>
        <td>${formatNumber(c)}</td>
        <td>${formatNumber(v)}</td>
    </tr>`;
});

// portal badge
let status = (item["Portal Status"] || "").toLowerCase();
let badgeClass = status === "active" ? "active" : "inactive";

// MDR %
let mdr = Number(item["MDR Offus"]||0);

document.getElementById("result").innerHTML = `
<div class="card">
<h2>${item["Store Name"]}</h2>
<p>HQ ID: ${item["HQ ID"]}</p>

<p>
Portal Status:
<span class="badge ${badgeClass}">${item["Portal Status"]||"-"}</span>
</p>

<p>MDR Offus: ${mdr}%</p>
<div class="progress">
<div class="progress-bar" style="width:${mdr}%"></div>
</div>

<div class="kpi-container">
<div class="kpi">
<h3>${formatNumber(totalCount)}</h3>
<p>Total Count</p>
</div>
<div class="kpi">
<h3>${formatNumber(totalVol)}</h3>
<p>Total Volume</p>
</div>
</div>

<table>
<tr><th>Month</th><th>Count</th><th>Volume</th></tr>
${tableRows}
</table>
</div>`;

// chart
let ctx = document.getElementById("chart").getContext("2d");

if(chart) chart.destroy();

chart = new Chart(ctx,{
    type:'bar',
    data:{
        labels: months,
        datasets:[{
            label:"Volume",
            data: volumes
        }]
    }
});
}
</script>

</body>
</html>
